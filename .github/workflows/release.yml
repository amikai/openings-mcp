name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  test:
    strategy:
      matrix:
        # The runner label encodes os+arch, so tests run natively on all
        # six supported platforms: linux/macos/windows x amd64/arm64.
        os:
          - ubuntu-latest # linux amd64
          - ubuntu-24.04-arm # linux arm64
          - macos-latest # macos arm64
          - macos-15-intel # macos amd64
          - windows-latest # windows amd64
          - windows-11-arm # windows arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Unit tests
        shell: bash
        env:
          # The race detector is unsupported on windows/arm64.
          RACE: ${{ (runner.os != 'Windows' || runner.arch != 'ARM64') && '-race' || '' }}
        run: go test $RACE -vet=all ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
