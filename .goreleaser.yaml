version: 2

project_name: openings-mcp

builds:
  - id: openings-mcp
    main: ./cmd/openings-mcp
    binary: openings-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: openings-mcp
    formats: [tar.gz]
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - name: openings-mcp
    ids:
      - openings-mcp
    binaries:
      - openings-mcp
    homepage: 'https://github.com/amikai/openings-mcp'
    description: 'MCP server for searching job listings across job boards and company career sites'
    directory: Casks
    commit_msg_template: 'chore: update Homebrew cask for {{ .ProjectName }} {{ .Tag }}'
    repository:
      owner: amikai
      name: homebrew-tap
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'

dockers_v2:
  - images:
      - ghcr.io/amikai/openings-mcp
    tags:
      - '{{ .Version }}'
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: '{{ .ProjectName }}'
      org.opencontainers.image.description: 'MCP server for searching job listings across job boards and company career sites'
      org.opencontainers.image.source: 'https://github.com/amikai/openings-mcp'
      org.opencontainers.image.version: '{{ .Version }}'
      org.opencontainers.image.licenses: MIT

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs'
      - '^test'
      - '^chore'
