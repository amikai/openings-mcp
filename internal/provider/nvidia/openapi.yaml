    JobsResponse:
      type: object
      description: >
        The production API also returns `facets`, the full current facet tree
        with live counts; it is not required for the minimal search-then-detail
        workflow and is omitted here. See the parameter table above for known
        facet parameter names and values.
      required: [total, jobPostings]
      properties:
        total:
          type: integer
          nullable: true
          description: >
            Total matching job count. Capped at 2000 when no facets or search
            text are applied; exact once any filter narrows the result set.
          example: 508
        jobPostings:
          type: array
          items:
            $ref: "#/components/schemas/JobSummary"

    JobSummary:
      type: object
      description: >
        Observed job listing entries occasionally omit title/externalPath
        entirely (leaving only bulletFields) — likely an incomplete/transient
        posting on Workday's side. Neither field is marked required so
        decoding tolerates that; callers should skip entries with an empty
        externalPath rather than assume every entry is fetchable.
      properties:
        title:
          type: string
          nullable: true
          example: "Software Engineer, CUDA-Q"
        externalPath:
          type: string
          description: Path for `GET /job/{externalPath}` (leading slash included).
          example: "/job/US-CA-Remote/Software-Engineer--CUDA-Q_JR2011649"
        locationsText:
          type: string
          nullable: true
          description: Human-readable location summary, e.g. a city or "N Locations".
          example: "2 Locations"
        postedOn:
          type: string
          nullable: true
          description: Human-readable relative posting date.
          example: "Posted 30+ Days Ago"

    JobDetailResponse:
      type: object
      required: [jobPostingInfo]
      properties:
        jobPostingInfo:
          $ref: "#/components/schemas/JobPostingInfo"

    JobPostingInfo:
      type: object
      required: [title, jobDescription]
      properties:
        title:
          type: string
          nullable: true
          example: "Software Engineer, CUDA-Q"
        jobDescription:
          type: string
          nullable: true
          description: Full HTML job description.
        location:
          type: string
          nullable: true
          example: "US, CA, Remote"
        additionalLocations:
          type: array
          items:
            type: string
        postedOn:
          type: string
          nullable: true
          example: "Posted 30+ Days Ago"
        timeType:
          type: string
          nullable: true
          example: "Full time"
        jobReqId:
          type: string
