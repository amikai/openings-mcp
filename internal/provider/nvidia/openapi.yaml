openapi: 3.1.0

info:
  title: NVIDIA Careers Minimal Job Search API
  version: "1.0.0"
  description: >
    Minimal client API surface needed to search NVIDIA Careers jobs
    (https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite) and fetch a
    full job description. Powered by Workday's Candidate Experience (CXS)
    platform.

    Observed filter parameters: `POST /jobs` accepts `appliedFacets`, a map of
    facet parameter name to an array of selected value ids. Known parameter
    names and their observed values:

    | facetParameter       | UI label      | Example values (descriptor → id)                                   |
    |----------------------|---------------|---------------------------------------------------------------------|
    | `jobFamilyGroup`     | Job Category  | Engineering → `0c40f6bd1d8f10ae43ffaefd46dc7e78`, Sales → `0c40f6bd1d8f10ae43ffcac5bbec7e90` |
    | `workerSubType`      | Job Type      | Regular Employee → `0c40f6bd1d8f10adf6dae161b1844a15`, Intern (Fixed Term) → observed via UI |
    | `timeType`           | Time Type     | Full time → `5509c0b5959810ac0029943377d47364`, Part time → `5509c0b5959810ac00299430e7947363` |
    | `locationHierarchy2` | Location Type | Office → `0c3f5f117e9a0101f6422f0fe79d0000`, Remote → `0c3f5f117e9a0101f63dc469c3010000` |
    | `locationHierarchy1` | Location      | Country name → opaque id, e.g. United States → `2fcb99c455831013ea52fb338f2932d8` |

    These ids are opaque Workday GUIDs and not derivable from their labels.
    The full, current set (all countries, categories, etc.) is returned as
    `facets` on every `/jobs` response; treat the table above as a seed for
    common values rather than an exhaustive list, and prefer reading ids from
    a live response over hardcoding them.

servers:
  - url: https://nvidia.wd5.myworkdayjobs.com/wday/cxs/nvidia/NVIDIAExternalCareerSite
    description: NVIDIA Careers (Workday CXS)

tags:
  - name: Jobs
    description: Minimal job search and detail endpoints

paths:
  /jobs:
    post:
      tags: [Jobs]
      summary: Search / filter / paginate jobs
      description: >
        Searches jobs by keyword and/or facet filters, paginated via
        `limit`/`offset`. `limit` is capped server-side at 20; a higher value
        returns HTTP 400.

        Observed minimal request requirements: `appliedFacets`, `limit`,
        `offset`, and `searchText` are all required by the API (send `{}`
        for `appliedFacets` and `""` for `searchText` when unused).
      operationId: searchJobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobsRequest"
            examples:
              minimal:
                summary: Unfiltered keyword search
                value:
                  appliedFacets: {}
                  limit: 20
                  offset: 0
                  searchText: "CUDA"
              filtered:
                summary: Engineering + Remote + United States
                value:
                  appliedFacets:
                    jobFamilyGroup: ["0c40f6bd1d8f10ae43ffaefd46dc7e78"]
                    locationHierarchy2: ["0c3f5f117e9a0101f63dc469c3010000"]
                    locationHierarchy1: ["2fcb99c455831013ea52fb338f2932d8"]
                  limit: 20
                  offset: 0
                  searchText: ""
              paginated:
                summary: Second page of results
                value:
                  appliedFacets: {}
                  limit: 20
                  offset: 20
                  searchText: ""
      responses:
        "200":
          description: Search succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsResponse"
        default:
          description: >
            Any non-200 status. The API is reverse-engineered, so error codes
            are not exhaustively known; a 400 has been observed for malformed
            requests — e.g. `limit` above 20, or an unknown facet
            parameter/value id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /job/{location}/{titleSlug}:
    get:
      tags: [Jobs]
      summary: Get job detail
      description: >
        Fetches a single job posting. `externalPath` returned from the search
        endpoint always has the form `/job/{location}/{titleSlug}` (exactly
        two segments after `/job/`); split it on the first `/` to get these
        two path parameters. A single combined path parameter does not work
        here — standard URI encoders percent-encode the `/` inside it,
        producing an invalid URL that the server rejects with HTTP 400.
      operationId: getJobDetail
      parameters:
        - name: location
          in: path
          required: true
          description: Location slug segment, e.g. `US-CA-Remote`.
          schema:
            type: string
          example: "US-CA-Remote"
        - name: titleSlug
          in: path
          required: true
          description: Title-and-requisition-id segment, e.g. `Software-Engineer--CUDA-Q_JR2011649`.
          schema:
            type: string
          example: "Software-Engineer--CUDA-Q_JR2011649"
      responses:
        "200":
          description: Job detail found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetailResponse"
        default:
          description: >
            Any non-200 status. The API is reverse-engineered, so error codes
            are not exhaustively known; a 404 has been observed when the job
            posting is gone or no longer active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    JobsRequest:
      type: object
      required: [appliedFacets, limit, offset, searchText]
      properties:
        appliedFacets:
          $ref: "#/components/schemas/AppliedFacets"
        limit:
          type: integer
          minimum: 1
          maximum: 20
          description: Page size. Server caps this at 20.
          example: 20
        offset:
          type: integer
          minimum: 0
          description: Zero-based result offset for pagination.
          example: 0
        searchText:
          type: string
          description: Free-text keyword search across job title and description.
          example: "CUDA"

    AppliedFacets:
      type: object
      description: >
        One property per known facet parameter (see the parameter table
        above). Each holds an array of selected value ids: OR'd within a
        facet, AND'd across facets. Omit a property (or leave its array
        empty) to leave that dimension unfiltered. Value ids are opaque
        Workday GUIDs — resolve them from a facet label via the
        JobCategoryIDs / JobTypeIDs / TimeTypeIDs / LocationTypeIDs /
        CountryIDs / SiteIDs lookup tables rather than guessing.
      properties:
        jobFamilyGroup:
          type: array
          items:
            type: string
            enum:
              - "0c40f6bd1d8f10ae43ffaefd46dc7e78" # Engineering
              - "0c40f6bd1d8f10ae43ffcac5bbec7e90" # Sales
              - "0c40f6bd1d8f10ae43ffc3fc7d8c7e8a" # Operations
              - "0c40f6bd1d8f10ae43ffc668c6847e8c" # Program Manager
              - "0c40f6bd1d8f10ae43ffc19725ec7e88" # Marketing
              - "0c40f6bd1d8f10ae43ffc8817cf47e8e" # Research
              - "0c40f6bd1d8f10ae43ffbd1459047e84" # IT - Information Technology
              - "0c40f6bd1d8f10ae43ffda1e8d447e94" # Univ Employment
              - "0c40f6bd1d8f10ae43ffb5dd06f47e7e" # Finance
              - "e8bdc341a93101bd5f4d2b0a1c005e36" # Professional Services
              - "0c40f6bd1d8f10ae43ffbac3680c7e82" # Human Resources
              - "0c40f6bd1d8f10ae43ffbf4412147e86" # Legal
              - "0c40f6bd1d8f10ae43ffb3a6aaac7e7c" # Facilities
              - "0c40f6bd1d8f10ae43ffac5fdfac7e76" # Business Development
        workerSubType:
          type: array
          items:
            type: string
            enum:
              - "0c40f6bd1d8f10adf6dae161b1844a15" # Regular Employee
              - "0c40f6bd1d8f10adf6dae2cd57444a16" # Management
              - "ab40a98049581037a3ada55b087049b7" # New College Graduate
              - "0c40f6bd1d8f10adf6dae42e46d44a17" # Intern (Fixed Term)
              - "cc40d60d614c01809d56fe967144ce2c" # Regular Employee (Fixed Term)
              - "ec9560ee6dc71001d6f3cf17ea640000" # Academic (Fixed Term)
        timeType:
          type: array
          description: >
            Time Type value ids. One of: Full time, Part time (see TimeTypeIDs).
          items:
            type: string
            enum:
              - "5509c0b5959810ac0029943377d47364" # Full time
              - "5509c0b5959810ac00299430e7947363" # Part time
        locationHierarchy2:
          type: array
          description: >
            Location Type value ids. One of: Office, Remote (see LocationTypeIDs).
          items:
            type: string
            enum:
              - "0c3f5f117e9a0101f6422f0fe79d0000" # Office
              - "0c3f5f117e9a0101f63dc469c3010000" # Remote
