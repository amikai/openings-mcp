    $(function () {
        var opportunity = new US.Opportunity.CandidateOpportunityDetail({"Id":"0b81b2f5-ffe3-4604-93b8-19d912c2424f","Title":"Conseiller Senior en Partenariat-BeniBiz","Featured":false,"FullTime":true,"HoursPerWeek":null,"JobCategoryName":"Human Resources","Locations":[{"Id":"97363f9d-aa9f-5bb8-9553-f8d468bb3ddd","LocalizedName":null,"LocalizedLocationId":null,"LocalizedDescription":"Benin/Cotonou","Address":{"Line1":null,"Line2":null,"City":"Cotonou, Littoral","State":null,"PostalCode":null,"Country":{"Id":"d312b6d9-e880-486f-acd3-074100263956","Name":"Benin","Code":"BEN"}},"DisplayName":false,"DisplayLocationId":false,"DisplayDescription":true,"DisplayAddress":true,"DisplayStreetAddress":false,"Coordinates":{"Longitude":-94.20873973909094,"Latitude":47.34297768720956},"Shapes":null,"SourceOfTruth":1,"IsAvailableForOpportunities":true}],"PostedDate":"2025-11-13T10:42:18.461Z","UpdatedDate":"2026-02-23T15:31:47.352Z","RequisitionNumber":"CONSE005183","Description":"\u003cp\u003e\u003cstrong\u003eTitre du poste\u003c/strong\u003e: Conseiller Senior en Partenariat\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLieu\u003c/strong\u003e: Cotonou\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSuperviseur\u003c/strong\u003e: Responsable de l\u0026rsquo;Appui \u0026agrave; l\u0027\u0026Eacute;cosyst\u0026egrave;me Entrepreneurial\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eProjet\u003c/strong\u003e: BeniBiz\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ePr\u0026eacute;sentation de Technoserve:\u003c/strong\u003e\u003cbr /\u003eTout le monde m\u0026eacute;rite l\u0027opportunit\u0026eacute; de construire un avenir meilleur. Cette id\u0026eacute;e simple est au c\u0026oelig;ur du travail de TechnoServe dans le monde entier depuis plus de 50 ans. TechnoServe est un pionnier de l\u0027exploitation du pouvoir des entreprises et des march\u0026eacute;s pour cr\u0026eacute;er des voies durables de sortie de la pauvret\u0026eacute;.Les communaut\u0026eacute;s \u0026agrave; faibles revenus dans lesquelles nous travaillons sont pleines de gens entreprenants. Leurs petites exploitations agricoles et leurs entreprises sont les cl\u0026eacute;s du d\u0026eacute;veloppement \u0026eacute;conomique. Mais elles sont confront\u0026eacute;es \u0026agrave; de nombreux d\u0026eacute;fis: faible niveau d\u0027alphab\u0026eacute;tisation, manque d\u0027acc\u0026egrave;s aux emplois et aux march\u0026eacute;s, dynamiques politiques impr\u0026eacute;visibles et, de plus en plus, effets du changement climatique. Pour de nombreuses femmes et jeunes gens, les d\u0026eacute;fis sont encore plus redoutables. En travaillant avec le personnel de TechnoServe, des personnes du monde entier se sortent de la pauvret\u0026eacute;. Lorsque les revenus augmentent et que les conditions de vie des familles s\u0027am\u0026eacute;liorent, celles-ci peuvent acc\u0026eacute;der \u0026agrave; des soins de sant\u0026eacute; et \u0026agrave; une \u0026eacute;ducation auparavant hors de port\u0026eacute;e. Les communaut\u0026eacute;s et m\u0026ecirc;me des pays entiers s\u0027en portent mieux.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eDescription du projet BeniBiz:\u003c/strong\u003e\u003cbr /\u003eTechnoServe met en \u0026oelig;uvre au B\u0026eacute;nin le projet BeniBiz, \u0026lsquo;\u0026rsquo; un acc\u0026eacute;l\u0026eacute;rateur de croissance d\u0026rsquo;entreprise\u0026rsquo;\u0026rsquo; avec l\u0026rsquo;appui financier des Coop\u0026eacute;rations Suisse et N\u0026eacute;erlandaise et de l\u0026rsquo;Union Europ\u0026eacute;enne. Pendant sa premi\u0026egrave;re phase (2017-2022), le projet a recrut\u0026eacute; et accompagn\u0026eacute; environ 6,000 entrepreneur(e)s au B\u0026eacute;nin qui ont enregistr\u0026eacute; une croissance moyenne de +130 % de chiffre d\u0027affaires et + de 10.000 emplois cr\u0026eacute;\u0026eacute;s. BeniBiz a offert aux entrepreneur(e)s les comp\u0026eacute;tences et l\u0026rsquo;accompagnement dont ils ont besoin pour d\u0026eacute;velopper des entreprises prosp\u0026egrave;res. Le projet est actuellement dans sa deuxi\u0026egrave;me phase (2022-2027) avec un impact cibl\u0026eacute; sur : la consolidation de l\u0026rsquo;impact de BeniBiz Phase 1, passage \u0026agrave; l\u0026rsquo;\u0026eacute;chelle avec une forte implication des acteurs locaux , Appui direct (formation \u0026amp; coaching) \u0026agrave; + de 11,000 entrepreneur(e)s ;l\u0026rsquo;appui aux Structures d\u0027Accompagnement des Entreprises (SAE) ;le co-d\u0026eacute;veloppement d\u0027interventions d\u0027appui avec les acteurs strat\u0026eacute;giques locaux en vue de la p\u0026eacute;rennisation ;la digitalisation de la m\u0026eacute;thodologie d\u0026rsquo;accompagnement des entrepreneurs;le renforcement de capacit\u0026eacute;s de\u0026nbsp; l\u0027Association Nationale des Femmes Entrepreneures. Dans sa deuxi\u0026egrave;me phase et\u0026nbsp; \u0026agrave; travers sa Composante Appui \u0026agrave; l\u0027\u0026Eacute;cosyst\u0026egrave;me, le projet cible la mise en \u0026oelig;uvre des activit\u0026eacute;s de soutien aux acteurs locaux aux fins de co-construire des solutions leur permettant d\u0027am\u0026eacute;liorer leurs mod\u0026egrave;les commerciaux, accro\u0026icirc;tre leurs chiffres d\u0027affaires ou encore apporter des changements syst\u0026eacute;miques durables dans l\u0026rsquo;\u0026eacute;cosyst\u0026egrave;me.\u003c/p\u003e\n\u003cp\u003ePour renforcer l\u0026rsquo;\u0026eacute;quipe de cette composante BeniBiz recrute un Conseiller s\u0026eacute;nior en partenariat.\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eDescription du poste\u0026nbsp;:\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eMembre de l\u0026rsquo;\u0026eacute;quipe de gestion du projet, le Conseiller Senior en Partenariat a pour mission principale de renforcer et accompagner l\u0027\u0026eacute;quipe de la composante Appui \u0026agrave; l\u0027\u0026eacute;cosyst\u0026egrave;me ainsi que nouer et g\u0026eacute;rer des interventions partenariales avec les principaux acteurs du secteur priv\u0026eacute; (et public) aux fins d\u0026rsquo;am\u0026eacute;liorer les prestations de services/produits au profit des b\u0026eacute;n\u0026eacute;ficiaires.\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eResponsabilit\u0026eacute;s principales\u0026nbsp;:\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eLe Conseiller Senior en Partenariat aura pour responsabilit\u0026eacute;s principales d\u0026rsquo;identifier, planifier et mettre en \u0026oelig;uvre des interventions syst\u0026eacute;miques relatives \u0026agrave; l\u0026rsquo;acc\u0026egrave;s aux comp\u0026eacute;tences, l\u0026rsquo;acc\u0026egrave;s au march\u0026eacute;, l\u0026rsquo;acc\u0026egrave;s au financement et l\u0026rsquo;acc\u0026egrave;s \u0026agrave; l\u0026rsquo;information. Il/elle recherche des partenaires strat\u0026eacute;giques et con\u0026ccedil;oit et met en \u0026oelig;uvre des interventions syst\u0026eacute;miques align\u0026eacute;es sur les approches et principes MSD.\u003c/p\u003e\n\u003cp\u003eLe Conseiller Senior en Partenariat soutiendra le responsable de l\u0026rsquo;appui \u0026agrave; l\u0027\u0026eacute;cosyst\u0026egrave;me pour renforcer les comp\u0026eacute;tences techniques en termes de gestion de partenariat de l\u0026rsquo;\u0026eacute;quipe ainsi que d\u0026eacute;finir et ex\u0026eacute;cuter une strat\u0026eacute;gie pour un ou plusieurs syst\u0026egrave;mes de march\u0026eacute; dans le cadre du programme BeniBiz. De fa\u0026ccedil;on sp\u0026eacute;cifique, il/elle identifiera dans l\u0026rsquo;\u0026eacute;cosyst\u0026egrave;me entrepreneurial les probl\u0026eacute;matiques majeures auxquelles peuvent s\u0026rsquo;appliquer des solutions syst\u0026eacute;miques innovantes et renforcer les capacit\u0026eacute;s des partenaires. Il/elle engagera les principaux acteurs du march\u0026eacute; dans la conception et la mise en \u0026oelig;uvre d\u0026rsquo;interventions strat\u0026eacute;giques pour surmonter ces goulots d\u0026rsquo;\u0026eacute;tranglement identifi\u0026eacute;s.\u003c/p\u003e\n\u003cp\u003eCertaines des responsabilit\u0026eacute;s peuvent inclurent:\u003c/p\u003e\n\u003cp\u003eIdentifier et prioriser les probl\u0026egrave;mes/contraintes syst\u0026eacute;miques et promouvoir les activit\u0026eacute;s \u0026agrave; valeur ajout\u0026eacute;e par le biais de consultations avec les parties prenantes. L\u0027accent sera mis sur les obstacles \u0026agrave; l\u0027acc\u0026egrave;s aux comp\u0026eacute;tences, au financement, au march\u0026eacute; et \u0026agrave; l\u0026rsquo;information, \u0026agrave; la pleine participation et aux avantages pour les groupes cibles en ce qui concerne les syst\u0026egrave;mes de march\u0026eacute; et les opportunit\u0026eacute;s \u0026eacute;conomiques.\u003c/p\u003e\n\u003cp\u003eContribuer \u0026agrave; l\u0026rsquo;analyse des syst\u0026egrave;mes de march\u0026eacute;s d\u0026rsquo;offres des services d\u0026rsquo;acc\u0026egrave;s aux comp\u0026eacute;tences, acc\u0026egrave;s au march\u0026eacute;, acc\u0026egrave;s au et au financement et acc\u0026egrave;s \u0026agrave; l\u0026rsquo;information, dans l\u0026rsquo;\u0026eacute;cosyst\u0026egrave;me entrepreneurial b\u0026eacute;ninois. Cela implique la mise en \u0026oelig;uvre d\u0026rsquo;interventions, la r\u0026eacute;alisation d\u0026rsquo;analyses sectorielles continues et la fourniture de contributions, de donn\u0026eacute;es et d\u0026rsquo;informations pour la conception de nouvelles activit\u0026eacute;s d\u0026rsquo;intervention.\u003c/p\u003e\n\u003cp\u003eRenforcer et coacher en continu l\u0026rsquo;\u0026eacute;quipe de la composante Appui \u0026agrave; l\u0027\u0026eacute;cosyst\u0026egrave;me pour am\u0026eacute;liorer rapidement les comp\u0026eacute;tences techniques en gestion strat\u0026eacute;gique et op\u0026eacute;ration de partenariat de chaque membre, et les amener \u0026agrave; \u0026ecirc;tre des experts autonomes en la mati\u0026egrave;re.\u003c/p\u003e\n\u003cp\u003eContribuer \u0026agrave; la mise \u0026agrave; jour permanente de la cartographie des acteurs de l\u0027\u0026eacute;cosyst\u0026egrave;me de l\u0026rsquo;appui \u0026agrave; l\u0026rsquo;entrepreneuriat.\u003c/p\u003e\n\u003cp\u003eIdentifier et \u0026eacute;laborer des interventions strat\u0026eacute;giques op\u0026eacute;rationnal durables avec des partenaires de l\u0027\u0026eacute;cosyst\u0026egrave;me\u0026nbsp;: \u0026agrave; titre illustratif structurer des interventions visant l\u0027int\u0026eacute;gration des programmes d\u0027entrepreneuriat dans les \u0026eacute;coles publiques au B\u0026eacute;nin, ou aider les soci\u0026eacute;t\u0026eacute;s de services financiers \u0026agrave; d\u0026eacute;velopper de nouveaux services ou produits inclusifs au profit de leurs clients.\u003c/p\u003e\n\u003cp\u003eOrganiser des discussions et s\u0026eacute;ances de travail avec les parties prenantes pour identifier les besoins commerciaux et \u0026eacute;laborer des solutions.\u003c/p\u003e\n\u003cp\u003eRepr\u0026eacute;senter le projet lors des r\u0026eacute;unions de r\u0026eacute;seautage et de relations avec les acteurs priv\u0026eacute;s et publics.\u003c/p\u003e\n\u003cp\u003eG\u0026eacute;rer les flux de travail dans le cadre des interventions du programme - s\u0027assurer que les activit\u0026eacute;s sont men\u0026eacute;es \u0026agrave; bien.\u003c/p\u003e\n\u003cp\u003eSoutenir la gestion des consultants externes et des sous-traitants.\u003c/p\u003e\n\u003cp\u003eAvec l\u0027aide du Responsable Communication et du Responsable Suivi \u0026amp; Evaluation, suivre et \u0026eacute;valuer les progr\u0026egrave;s des activit\u0026eacute;s sectorielles.\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eQualifications, comp\u0026eacute;tences et aptitudes requises:\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eLicence en gestion, \u0026eacute;conomie, commerce, marketing ou \u0026eacute;quivalent avec au moins 5 ans d\u0026rsquo;exp\u0026eacute;rience ou Master\u0026nbsp;avec 3 ans d\u0026rsquo;exp\u0026eacute;rience d\u0026eacute;montr\u0026eacute;e dans la gestion de partenariats.\u003c/p\u003e\n\u003cp\u003eBonne compr\u0026eacute;hension des syst\u0026egrave;mes de march\u0026eacute;, exp\u0026eacute;rience dans la conduite d\u0027analyses de march\u0026eacute; afin de prendre des d\u0026eacute;cisions d\u0027affaires ou d\u0027investissement.\u003c/p\u003e\n\u003cp\u003eUne exp\u0026eacute;rience d\u0026rsquo;au moins 3 ans dans le secteur priv\u0026eacute;, le conseil, ou la gestion de partenariat est requise.\u003c/p\u003e\n\u003cp\u003eExp\u0026eacute;rience de l\u0027\u0026eacute;laboration de rapports et de pr\u0026eacute;sentations bien r\u0026eacute;dig\u0026eacute;s.\u003c/p\u003e\n\u003cp\u003eCapacit\u0026eacute; \u0026agrave; mener des analyses quantitatives et qualitatives.\u003c/p\u003e\n\u003cp\u003eOrientation d\u0026eacute;montr\u0026eacute;e vers la pens\u0026eacute;e novatrice avec une forte capacit\u0026eacute; \u0026agrave; g\u0026eacute;n\u0026eacute;rer des id\u0026eacute;es/solutions cr\u0026eacute;atives et \u0026agrave; pr\u0026eacute;dire les r\u0026eacute;sultats possibles.\u003c/p\u003e\n\u003cp\u003eUne exp\u0026eacute;rience dans la mise en \u0026oelig;uvre de programmes d\u0027aide au d\u0026eacute;veloppement du secteur priv\u0026eacute; ou des micros, petites et moyennes entreprises (MPME) serait consid\u0026eacute;r\u0026eacute;e comme un atout, mais pas obligatoire.\u003c/p\u003e\n\u003cp\u003eEngagement \u0026agrave; faire progresser l\u0027\u0026eacute;galit\u0026eacute; des sexes.\u003c/p\u003e\n\u003cp\u003eConfiance et sensibilit\u0026eacute; dans les communications avec les clients et les parties prenantes.\u003c/p\u003e\n\u003cp\u003eCompr\u0026eacute;hension d\u0026eacute;montr\u0026eacute;e - et engagement \u0026agrave; surmonter - les obstacles qui d\u0026eacute;savantagent les personnes vuln\u0026eacute;rables, les femmes et les jeunes et les excluent des opportunit\u0026eacute;s \u0026eacute;conomiques.\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eAutres comp\u0026eacute;tences et aptitudes\u0026nbsp;:\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eCuriosit\u0026eacute;, dynamisme et motivation\u003cbr /\u003eCapacit\u0026eacute; \u0026agrave; d\u0026eacute;velopper des m\u0026eacute;thodes de r\u0026eacute;flexion et de travail innovantes et cr\u0026eacute;atives\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eLangues :\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eUne parfaite ma\u0026icirc;trise du fran\u0026ccedil;ais\u003cbr /\u003eUne bonne connaissance des langues locales vivement souhait\u0026eacute;e\u003cbr /\u003eUne bonne connaissance de l\u0026rsquo;anglais serait un atout\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eVoyages :\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eD\u0026eacute;placements sur le territoire national (jusqu\u0027\u0026agrave; 80 % du temps)\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eResponsabilit\u0026eacute;s de supervision:\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eJouera un r\u0026ocirc;le d\u0026eacute;terminant dans l\u0026rsquo;appui conseil et le renforcement de comp\u0026eacute;tences des Conseillers en Partenariat\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eSavoir-\u0026ecirc;tre :\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eFortes aptitudes interpersonnelles et interculturelles\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022text-decoration: underline;\u0022\u003e\u003cstrong\u003eInstructions aux candidats :\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003eLes candidats (es) qualifi\u0026eacute;s (es) et int\u0026eacute;ress\u0026eacute;s (es) devront soumettre directement leur candidature comportant :\u0026nbsp;\u0026nbsp;\u0026nbsp;\u0026nbsp;une lettre de motivation et un curriculum d\u0026eacute;taill\u0026eacute;\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eLa date limite de d\u0026eacute;p\u0026ocirc;t des candidatures est fix\u0026eacute;e au\u0026nbsp;24 novembre 2025 18h00.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSeules les candidatures r\u0026eacute;pondant aux qualifications minimales requises seront consid\u0026eacute;r\u0026eacute;es.\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eSeules les candidatures \u0026eacute;lectroniques seront consid\u0026eacute;r\u0026eacute;es.\u0026nbsp;\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eTechnoServe s\u0027engage \u0026agrave; cr\u0026eacute;er un environnement favorisant la diversit\u0026eacute; et est fier d\u0027\u0026ecirc;tre un employeur offrant \u0026agrave; tous les m\u0026ecirc;mes opportunit\u0026eacute;s. Nous encourageons toutes les personnes qualifi\u0026eacute;es qui partagent la vision de TechnoServe d\u0027am\u0026eacute;liorer la vie des autres gr\u0026acirc;ce \u0026agrave; des solutions commerciales \u0026eacute;prouv\u0026eacute;es \u0026agrave; postuler. Dans le cadre de notre engagement en faveur de la diversit\u0026eacute;, nous sommes fiers d\u0027\u0026ecirc;tre un employeur offrant l\u0027\u0026eacute;galit\u0026eacute; des chances et une action positive et nous ne pratiquons aucune discrimination fond\u0026eacute;e sur le sexe, la race, la couleur, l\u0027origine ethnique, la religion, l\u0027orientation sexuelle, l\u0027identit\u0026eacute; sexuelle, l\u0027\u0026acirc;ge, le statut VIH/SIDA, le statut de v\u0026eacute;t\u0026eacute;ran prot\u0026eacute;g\u0026eacute;, le handicap et toutes les autres classes prot\u0026eacute;g\u0026eacute;es.\u003c/p\u003e\n\u003cp\u003eNous sommes \u0026eacute;galement fiers de notre engagement \u0026agrave; prot\u0026eacute;ger le personnel, les partenaires et les b\u0026eacute;n\u0026eacute;ficiaires contre les abus et l\u0027exploitation et nous examinons minutieusement tous les candidats finaux en v\u0026eacute;rifiant rigoureusement leurs ant\u0026eacute;c\u0026eacute;dents et leurs r\u0026eacute;f\u0026eacute;rences.\u003c/p\u003e\n\u003cp\u003eSi vous souffrez d\u0027un handicap qui vous emp\u0026ecirc;che d\u0027utiliser notre syst\u0026egrave;me en ligne pour postuler \u0026agrave; un poste chez TechnoServe, veuillez contacter le service des ressources humaines \u0026agrave; l\u0027adresse recruitment@tns.org ou appeler le +1 202 785 4515.\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e","EqualOpportunityEmployerDescription":null,"PayTransparencyPolicyStatement":null,"MatchScore":1.0,"HasApplied":false,"ApplicationJobBoardName":null,"ApplicationJobBoardId":null,"DateApplied":null,"Salaried":true,"CompensationAmount":null,"PublishingStatus":1,"Links":[],"BehaviorCriteria":[],"MotivationCriteria":[],"EducationCriteria":[],"LicenseAndCertificationCriteria":[],"SkillCriteria":[],"WorkExperienceCriteria":[],"JobBoardMemberships":[{"JobBoardId":"817b593e-69ab-4cba-b403-869d36c4b229","PublishedInternal":true,"PublishedExternal":false,"ExternalPostedDate":null,"InternalPostedDate":"2025-11-13T10:42:18.456Z"},{"JobBoardId":"18180d88-ced0-4361-bd09-d5eef66dab24","PublishedInternal":false,"PublishedExternal":true,"ExternalPostedDate":"2025-11-13T10:42:18.456Z","InternalPostedDate":null}],"AssessmentUri":null,"AssessmentStatus":null,"OpportunityIsClosed":false,"TravelRequired":null,"TravelDescription":null,"SupervisorName":null,"Assessments":[],"ApplicationId":null,"CompensationAnnualMinimum":null,"CompensationAnnualMaximum":null,"Com                     accessibilityUrl: "/TEC1006TESER/JobBoard/18180d88-ced0-4361-bd09-d5eef66dab24/Accessibility",
                    resetCookie: false,
                    isModernStyleEnabled: true
                                                                                                                                                    }, accessbilityBanner);
            }
        </script>
    <script>

        function escapeHtml(text) {
            if (text == null) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
            document.addEventListener('DOMContentLoaded', function() {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('showBanner') === 'true') {
                    const banner = document.getElementById('Successbanner');
                    const bannerMessage = escapeHtml($.t("Common.QuickApply.SuccessBannerMessage"));
                    const bannerAction = escapeHtml($.t("Layout.AccessibilityBanner.DismissMessage"));
                    if (banner) {
                        var ugkBanner = document.createElement('ukg-banner');
                        ugkBanner.setAttribute('inline', '');
                        ugkBanner.setAttribute('type', 'success');
                        ugkBanner.textContent = bannerMessage;

                        var endDiv = document.createElement('div');
                        endDiv.setAttribute('slot', 'end');

                        var ugkButton = document.createElement('ukg-button');
                        ugkButton.setAttribute('aria-label', 'banner-action');
                        ugkButton.setAttribute('emphasis', 'low');
                        ugkButton.textContent = bannerAction;
                        ugkButton.addEventListener('click', dismissBanner);

                        endDiv.appendChild(ugkButton);
                        ugkBanner.appendChild(endDiv);

                        banner.innerHTML = '';
                        banner.appendChild(ugkBanner);
                        banner.style.display = 'block';
                    }
                }
            });
                    function dismissBanner() {
            const banner = document.getElementById('Successbanner');
            if (banner) {
                banner.style.display = 'none';
            }
        }
        </script>
    <script>
            $(function () {
                // Clears out Matchinator session data
                $("#LogOutButton").click(function () {
                    US.utils.localStorage.removeItem('personalizedSearchProfile');
                    return true;
                });

                $("#skipLink").click(function () {
                    SkipToMainContent();

                });

                $("#skipLink").keyup(function (e) {
                    if (e.keyCode == 13) {
                        SkipToMainContent();
                    }
                });

                function SkipToMainContent() {
                    var ele = $("#PageContainer");
                    if (ele.length > 0) {
var scrollTopValue = ele.offset().top;
                        if (typeof scrollTopValue === 'number' && isFinite(scrollTopValue)) {
                            $('html, body').animate({
                                scrollTop: scrollTopValue
                            });
                        }
                        var headingEle = ele.find('h1:first, h2:first').eq(0);
                        var focusableElement;
                        if (headingEle.length > 0) {
                            focusableElement = headingEle;
                        } else {
                            focusableElement = ele;
                        }
                        focusableElement.attr("tabindex", "-1").css("outline", "none").focus();

                        return false;
                    }
                }

                $(window).resize(function () {
                    if ($(window).width() <= 767) {
                        $(".nav-pills.nav-responsive").addClass("nav-stacked");
                    } else {
                        $(".nav-pills.nav-responsive").removeClass("nav-stacked");
                    }
                });
                $(window).resize();
            });
        </script>
